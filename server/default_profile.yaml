# default_profile.yaml
# ====================
# Default campaign profile for the Ad Platform RL environment.
# Used as a safeguard when no YAML_PATH is provided at runtime.
# Values are realistic approximations of a mid-sized Google Ads account
# across three campaign types: branded, generic, and display.
#
# Override any field by setting YAML_PATH to your own export file,
# or by passing a CampaignProfile directly to env.reset().

# Conversion rates per campaign (conversions per $ spent)
# Campaign 0: branded search     — high intent, best CVR
# Campaign 1: generic search     — medium intent, moderate CVR
# Campaign 2: display/retarget   — low intent, lowest CVR
conversion_rates: [0.05, 0.03, 0.02]

# Baseline competitor bids per campaign ($)
# Branded keywords have lower competition, generic higher
competitor_bids: [0.45, 0.55, 0.30]

# Per-campaign bid volatility (std-dev fraction)
# Generic search has higher volatility due to more competitors
bid_volatility: [0.05, 0.10, 0.06]

# Seasonal multipliers — 7-day weekly pattern (wraps across 30 steps)
# Mon-Fri higher intent, weekend lower for B2B-style campaigns
seasonal_multipliers: [1.10, 1.15, 1.15, 1.10, 1.05, 0.85, 0.80]

# Episode budget ($)
total_budget: 1000.0

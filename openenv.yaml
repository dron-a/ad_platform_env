spec_version: 1
name: ad_platform_env
version: "0.1.0"
description: "Multi-task ad platform RL environment"
type: space
runtime: fastapi
app: inference:app
port: 8000
tasks:
  - id: budget
    description: "Allocate a fixed budget across ad campaigns"
    difficulty: easy
    grader: grade/budget

  - id: auction
    description: "Bid competitively against adaptive competitors"
    difficulty: medium
    grader: grade/auction

  - id: dynamic_campaign
    description: "Manage budget and bids across campaigns"
    difficulty: hard
    grader: grade/dynamic_campaign